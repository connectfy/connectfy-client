services:
  client:
    container_name: connectfy-client-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: connectfy/connectfy-client-dev
    ports:
      - "4800:4800"
    volumes:
      - .:/usr/src/app
    networks:
      - connectfy-core-network
    env_file:
      - .env.development
    command: npm run dev
    restart: unless-stopped

networks:
  connectfy-core-network:
    external: true