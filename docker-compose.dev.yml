version: "3.8"

services:
  client:
    container_name: connectfy-client-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: connectfy/connectfy-client-dev
    ports:
      - "4800:4800"
    volumes:
      - .:/usr/src/app
    networks:
      - app-network
    environment:
      - HOST=0.0.0.0
    command: npm run dev
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
